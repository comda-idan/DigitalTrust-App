<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Digital Trust App</title>
  <meta name="description" content="Digital Trust App — COMDA secure digital signature demo (PWA)." />
  <meta name="theme-color" content="#4252A4" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Digital Trust" />
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Runtime CDN libraries (loaded in the browser; app degrades gracefully if blocked) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
</head>
<body>
  <div id="root"></div>
  <div id="toast"></div>

  <!-- App modules (order matters) -->
  <script src="js/i18n.js"></script>
  <script src="js/store.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/home.js"></script>
  <script src="js/sign.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/recipient.js"></script>

  <script>
    // Configure pdf.js worker once its script has loaded.
    function configurePdfWorker() {
      if (window.pdfjsLib) {
        try { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; } catch (e) {}
      }
    }
    window.addEventListener('load', function () {
      configurePdfWorker();
      window.App.boot();
    });
  </script>
</body>
</html>
